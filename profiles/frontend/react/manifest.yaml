# React Profile - Modèle Hybride 3 Niveaux
# ═══════════════════════════════════════════════════════════════
#
# NIVEAU 1: Industry Standards   → Sources professionnelles (web)
# NIVEAU 2: Project Conventions  → Spécificités équipe (à remplir)
# NIVEAU 3: Experience           → Erreurs passées (auto-Sentinel)
#
# DOCS OFFICIELLES → Context7 on-demand (pas stockées)
#
# ═══════════════════════════════════════════════════════════════

profile:
  id: react
  name: "React"
  category: frontend
  level: 2
  model: hybrid-3-levels
  description: "React - Modèle hybride: Industry + Conventions + Experience"
  last_updated: "2026-01-04"

# ═══════════════════════════════════════════════════════════════
# VERSIONING - CRITIQUE pour React
# ═══════════════════════════════════════════════════════════════
versioning:
  latest: "19.x"
  lts: "18.x"

  versions:
    "19.x":
      released: "2024-12"
      node_min: "18.x"
      features: ["use() hook", "Actions", "Server Components stable", "useFormStatus", "useOptimistic"]
    "18.x":
      released: "2022-03"
      node_min: "14.x"
      features: ["Concurrent rendering", "Suspense for data", "Transitions", "useId", "useSyncExternalStore"]
    "17.x":
      deprecated: true
      node_min: "10.x"
      features: ["Legacy JSX transform"]

  detection:
    file: "package.json"
    path: "dependencies.react"
    fallback: "latest"

  context7:
    default: "/websites/react_dev"
    reference: "/websites/react_dev_reference"
    "18.x": "/websites/18_react_dev"
    version_hint: true

  fallback_urls:
    latest: "https://react.dev/"
    "18.x": "https://18.react.dev/"
    legacy: "https://legacy.reactjs.org/"

dependencies:
  required:
    - javascript
  optional:
    - typescript
    - nextjs

# ═══════════════════════════════════════════════════════════════
# KNOWLEDGE 3 NIVEAUX
# ═══════════════════════════════════════════════════════════════
knowledge:

  # ─────────────────────────────────────────────────────────────
  # NIVEAU 1: Industry Standards (sources professionnelles)
  # ─────────────────────────────────────────────────────────────
  industry_standards:
    description: "Best practices React officielles (react.dev)"
    load: on_intent
    enriched_via: "/harmony learn --search"
    files:
      - knowledge/industry-standards/architecture.md
      - knowledge/industry-standards/hooks.md
      - knowledge/industry-standards/state-management.md
      - knowledge/industry-standards/performance.md

  # ─────────────────────────────────────────────────────────────
  # NIVEAU 2: Project Conventions (spécifique équipe)
  # ─────────────────────────────────────────────────────────────
  project_conventions:
    description: "Règles spécifiques au projet (à personnaliser)"
    load: always
    user_maintained: true
    files:
      - knowledge/project-conventions/README.md

  # ─────────────────────────────────────────────────────────────
  # NIVEAU 3: Experience (auto-enrichi par Sentinel)
  # ─────────────────────────────────────────────────────────────
  experience:
    description: "Erreurs passées et leçons apprises (auto-généré)"
    load: always
    auto_enriched: true
    source: ".claude/memory/error-journal.json"
    filter_tags: ["react", "javascript", "typescript", "frontend", "hooks"]
    files:
      - knowledge/experience/README.md

# ═══════════════════════════════════════════════════════════════
# CONTEXT7 INTEGRATION (Docs Officielles On-Demand)
# ═══════════════════════════════════════════════════════════════
context7:
  enabled: true
  library_id: "/websites/react_dev"

  suggested_queries:
    IMPLEMENT:
      - "components props children"
      - "hooks useState useEffect"
    STATE:
      - "state management useReducer"
      - "context API createContext"
    FORMS:
      - "forms controlled components"
      - "useActionState useFormStatus"
    PERFORMANCE:
      - "useMemo useCallback optimization"
      - "React.memo lazy Suspense"
    TEST:
      - "testing library jest"

# ═══════════════════════════════════════════════════════════════
# SENTINEL INTEGRATION
# ═══════════════════════════════════════════════════════════════
sentinel:
  watch_tags:
    - react
    - javascript
    - typescript
    - frontend
    - hooks
    - jsx
    - state

  auto_sync:
    enabled: true
    target: knowledge/experience/
    on_new_error: true

# ═══════════════════════════════════════════════════════════════
# SOURCES PROFESSIONNELLES (pour /harmony learn)
# ═══════════════════════════════════════════════════════════════
learn_sources:
  recommended:
    - url: "https://react.dev/learn"
      topics: ["fundamentals", "thinking in react"]
    - url: "https://react.dev/reference/react"
      topics: ["hooks", "components", "APIs"]

  search_queries:
    - "React best practices enterprise 2025"
    - "React hooks patterns advanced"
    - "React state management comparison"
