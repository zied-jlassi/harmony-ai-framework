# Gaming Specialty Pack
# Domain expertise for game development and gamification
# Knowledge populated via: /harmony learn

specialty:
  id: gaming
  name: "Gaming"
  version: "1.0.0"
  description: "Game development, gamification, game mechanics expertise"
  last_updated: null

# Agents included in this specialty
agents:
  - id: game-designer
    file: agents/game-designer.md
    persona: "Marcus"
    description: "Game mechanics, balancing, progression systems, economy design"

  - id: game-developer
    file: agents/game-developer.md
    persona: "Kai"
    description: "Game-specific code patterns, ECS, state machines, physics"

  - id: game-sm
    file: agents/game-sm.md
    persona: "Jordan"
    description: "Scrum Master gaming context (milestones, playtests, releases)"

  - id: game-ux
    file: agents/game-ux.md
    persona: "Maya"
    description: "Game UX/UI, HUD design, feedback loops, player onboarding"

  - id: game-sound
    file: agents/game-sound.md
    persona: "Aria"
    description: "Sound design, music, audio feedback, ambiance, SFX"

  - id: game-narrative
    file: agents/game-narrative.md
    persona: "Theo"
    description: "Story, dialogue, lore, world-building, quests"

  - id: game-qa
    file: agents/game-qa.md
    persona: "Luna-G"
    description: "Game testing, playtest sessions, bug hunting, balancing feedback"

# Domain patterns
patterns:
  - id: ecs
    file: patterns/ecs-pattern.md
    description: "Entity-Component-System architecture"

  - id: state-machine
    file: patterns/state-machine.md
    description: "Game state management (FSM, hierarchical)"

  - id: progression
    file: patterns/progression.md
    description: "XP, levels, unlocks, skill trees, achievements"

  - id: economy
    file: patterns/economy.md
    description: "In-game currency, sinks, faucets, balancing"

  - id: feedback-loop
    file: patterns/feedback-loop.md
    description: "Player feedback, juice, screen shake, particles"

# Knowledge sources (populated via /harmony learn)
knowledge:
  sources:
    - url: "https://www.gamedeveloper.com/"
      priority: 1
    - url: "https://gamedevbeginner.com/"
      priority: 2
    - url: "https://www.gameanalytics.com/blog/"
      priority: 3
    - url: "https://www.gameuidatabase.com/"
      priority: 4
    - url: "https://www.gamasutra.com/"
      priority: 5

  topics:
    # Game Design
    - mechanics       # core game mechanics
    - progression     # XP, levels, unlocks
    - balancing       # difficulty curves, economy
    - monetization    # F2P, IAP, battle passes

    # Game UX
    - hud             # heads-up display design
    - onboarding      # tutorials, FTUE
    - feedback        # visual, audio, haptic
    - accessibility   # game a11y, colorblind, subtitles

    # Audio
    - sound-design    # SFX, ambient, UI sounds
    - music           # adaptive music, loops
    - audio-feedback  # hit sounds, success cues

    # Analytics
    - analytics       # AARRR, retention, LTV
    - playtesting     # sessions, feedback
    - ab-testing      # game experiments

    # Technical
    - multiplayer     # matchmaking, lobbies, netcode
    - leaderboards    # ranking systems, ELO
    - achievements    # badges, trophies, challenges

# Tech stack recommendations
tech_stack:
  backend:
    - nestjs          # API backend
    - socket.io       # Real-time multiplayer
    - redis           # Leaderboards, sessions
  frontend:
    - angular         # Admin dashboard
    - phaser          # 2D game engine
    - three.js        # 3D graphics
    - pixi.js         # 2D rendering
  audio:
    - howler.js       # Web audio library
    - tone.js         # Music synthesis
  database:
    - postgresql      # Main DB
    - redis           # Cache, realtime
