# Legal Specialty Pack
# Legal compliance audit orchestrator - triggers security, RGPD, accessibility audits

specialty:
  id: legal
  name: "Legal"
  version: "1.0.0"
  description: "Legal compliance audit orchestrator - RGPD/GDPR, CGV, accessibility, security DPO"

# Branchs included in this specialty
branchs:
  - id: legal
    file: branchs/legal.md
    description: "Legal audit orchestrator - detects context, triggers specialized agents"
    default: true

# Knowledge sources
knowledge:
  topics:
    - rgpd            # RGPD/GDPR compliance
    - gdpr            # General Data Protection Regulation
    - cgv             # Conditions Generales de Vente
    - cgu             # Conditions Generales d'Utilisation
    - cookies         # Cookie consent requirements
    - dpo             # Data Protection Officer
    - privacy         # Privacy by design

  sources:
    - url: "https://www.cnil.fr/"
      priority: 1
    - url: "https://gdpr.eu/"
      priority: 2
    - url: "https://www.legifrance.gouv.fr/"
      priority: 3

# Patterns (embedded in branchs/legal.md)
patterns:
  - id: rgpd-audit
    description: "RGPD compliance audit checklist"
  - id: consent-flow
    description: "Cookie and consent management patterns"
  - id: data-mapping
    description: "Personal data mapping and registry"
