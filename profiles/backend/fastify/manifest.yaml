  topics:
    - routing          # routes, params
    - plugins          # plugin system
    - hooks            # lifecycle hooks
    - validation       # JSON Schema
    - serialization    # fast JSON
    - decorators       # extend request/reply

loading:
  strategy: jit
  max_files_per_request: 2
