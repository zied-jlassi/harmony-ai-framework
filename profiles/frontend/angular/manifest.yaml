# Angular Profile - Centralized Knowledge Model
# ═══════════════════════════════════════════════════════════════
#
# Knowledge centralisé dans knowledge/ (nouveau modèle)
# Override possible via .harmony/local/profiles/frontend/angular/
#
# ═══════════════════════════════════════════════════════════════

profile:
  id: angular
  name: "Angular"
  category: frontend
  level: 2
  description: "Angular - Platform for building mobile and desktop web applications"
  last_updated: "2026-01-05"

  requires: [typescript]
  optional: [rxjs]

# ═══════════════════════════════════════════════════════════════
# VERSIONING - CRITIQUE pour Angular
# ═══════════════════════════════════════════════════════════════
versioning:
  # Versions supportées
  latest: "19.x"
  lts: "18.x"

  versions:
    "19.x":
      released: "2024-11"
      node_min: "20.x"
      typescript_min: "5.4"
      features: ["signals stable", "standalone default", "zoneless preview"]
    "18.x":
      released: "2024-05"
      node_min: "18.x"
      typescript_min: "5.2"
      features: ["signals", "standalone", "control flow @if/@for"]
    "17.x":
      released: "2023-11"
      node_min: "18.x"
      typescript_min: "5.0"
      features: ["signals preview", "new control flow"]
    "16.x":
      deprecated: true
      node_min: "16.x"
      features: ["standalone components"]

  # Auto-détection depuis package.json
  detection:
    file: "package.json"
    path: "dependencies.@angular/core"
    fallback: "latest"

  # Context7 library par version
  context7:
    default: "/websites/angular_dev"
    "18.x": "/websites/v18_angular_dev"
    version_hint: true  # Ajoute "Angular {version}" au query

  # Fallback URLs si Context7 indisponible
  fallback_urls:
    latest: "https://angular.dev/"
    "18.x": "https://v18.angular.dev/"
    "17.x": "https://v17.angular.dev/"

dependencies:
  required:
    - typescript
  optional:
    - rxjs

# ═══════════════════════════════════════════════════════════════
# KNOWLEDGE - Références centralisées
# ═══════════════════════════════════════════════════════════════
knowledge:
  # Chemins relatifs à knowledge/ (centralisé)
  base_path: knowledge/

  # Knowledge framework (toujours chargé)
  core:
    - frameworks/angular/architecture.md
    - languages/typescript/typescript-advanced-types.md

  # Knowledge partagé
  shared:
    - shared/patterns/error-handling-patterns.md

  # Chargement par intent
  on_intent:
    SECURITY:
      - domains/security/owasp-top10.md
    TEST:
      - languages/typescript/typescript-advanced-types.md
    IMPLEMENT:
      - frameworks/angular/architecture.md

  # Override local (équipe)
  override:
    enabled: true
    path: .harmony/local/profiles/frontend/angular/knowledge/

# ═══════════════════════════════════════════════════════════════
# CONTEXT7 INTEGRATION (Docs Officielles On-Demand)
# ═══════════════════════════════════════════════════════════════
context7:
  enabled: true
  library_id: "/websites/angular_dev"

  suggested_queries:
    IMPLEMENT:
      - "components standalone signals"
      - "dependency injection inject"
    STATE:
      - "signals computed state management"
      - "rxjs observables async pipe"
    ROUTING:
      - "router lazy loading guards"
    FORMS:
      - "reactive forms validation"
    TEST:
      - "testing components jest"

# ═══════════════════════════════════════════════════════════════
# SENTINEL INTEGRATION
# ═══════════════════════════════════════════════════════════════
sentinel:
  watch_tags:
    - angular
    - typescript
    - frontend
    - rxjs
    - signals

  auto_sync:
    enabled: true
    target: .harmony/local/profiles/frontend/angular/knowledge/experience/
    on_new_error: true

# ═══════════════════════════════════════════════════════════════
# SOURCES PROFESSIONNELLES (pour /harmony learn)
# ═══════════════════════════════════════════════════════════════
learn_sources:
  recommended:
    - url: "https://angular.dev/style-guide"
      topics: ["naming", "structure", "conventions"]
    - url: "https://angular.dev/guide/signals"
      topics: ["signals", "state", "reactivity"]

  search_queries:
    - "Angular best practices enterprise 2025"
    - "Angular signals state management patterns"
    - "Angular standalone components architecture"
