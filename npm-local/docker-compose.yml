version: '3.8'

services:
  verdaccio:
    image: verdaccio/verdaccio:5
    container_name: harmony-npm-registry
    ports:
      # Bind only to localhost for security
      - "127.0.0.1:4873:4873"
    volumes:
      - ./config:/verdaccio/conf
      - ./storage:/verdaccio/storage
      - ./plugins:/verdaccio/plugins
    environment:
      - VERDACCIO_PORT=4873
    networks:
      - harmony-npm

networks:
  harmony-npm:
    driver: bridge
