# NestJS Profile
# Level 2 - Framework (requires TypeScript + Node.js)
# Knowledge populated via: /harmony learn
# Conditional loading via: profile-loader.sh

profile:
  id: nestjs
  name: "NestJS"
  category: backend
  level: 2
  description: "NestJS framework - modules, controllers, providers, guards"
  last_updated: "2026-01-04"

# ═══════════════════════════════════════════════════════════════
# VERSION MANAGEMENT - Critical for compatibility!
# ═══════════════════════════════════════════════════════════════
versioning:
  latest: "11.x"
  lts: "10.x"

  versions:
    "11.x":
      released: "2024-12"
      node_min: "20.x"
      typescript_min: "5.3"
    "10.x":
      released: "2023-06"
      node_min: "18.x"
      typescript_min: "5.0"
    "9.x":
      deprecated: true
      node_min: "16.x"

  # Auto-detection from project files
  detection:
    file: "package.json"
    path: "dependencies.@nestjs/core"
    fallback: "latest"

dependencies:
  required:
    - typescript
    - nodejs
  optional:
    - prisma
    - graphql
  conflicts:
    - express

# ═══════════════════════════════════════════════════════════════
# KNOWLEDGE - Conditional Loading Sections
# ═══════════════════════════════════════════════════════════════

knowledge:
  sources:
    - url: "https://docs.nestjs.com/"
      version: "latest"
    - url: "https://docs.nestjs.com/v10/"
      version: "10.x"

  # ─────────────────────────────────────────────────────────────
  # CONDITIONAL SECTIONS
  # ─────────────────────────────────────────────────────────────
  sections:

    # CORE - Always loaded when NestJS profile is active
    core:
      load: always
      files:
        - knowledge/core/modules.md
        - knowledge/core/controllers.md
        - knowledge/core/providers.md
      max_tokens: 2000
      description: "Essential NestJS concepts for any task"

    # ADVANCED - Loaded when specific keywords detected
    advanced:
      load: on_keyword
      keywords:
        - guard
        - interceptor
        - pipe
        - filter
        - middleware
        - exception
        - validation
        - custom decorator
      files:
        - knowledge/advanced/guards.md
        - knowledge/advanced/interceptors.md
        - knowledge/advanced/pipes.md
        - knowledge/advanced/filters.md
        - knowledge/advanced/middleware.md
      max_tokens: 3000
      max_files: 2
      description: "Advanced patterns loaded on-demand"

    # TESTING - Loaded for test-related intents
    testing:
      load: on_intent
      intents:
        - TEST
        - TDD
        - COVERAGE
        - SPEC
      keywords:
        - test
        - spec
        - mock
        - jest
        - e2e
        - supertest
      files:
        - knowledge/testing/unit-testing.md
        - knowledge/testing/e2e-testing.md
        - knowledge/testing/mocking.md
      max_tokens: 2000
      description: "Testing patterns and best practices"

    # SECURITY - Loaded for security-related work
    security:
      load: on_intent
      intents:
        - SECURITY
        - AUTH
        - AUDIT
        - PENTEST
      keywords:
        - auth
        - jwt
        - passport
        - guard
        - role
        - permission
        - rbac
        - session
        - oauth
      files:
        - knowledge/security/authentication.md
        - knowledge/security/authorization.md
        - knowledge/security/best-practices.md
      max_tokens: 1500
      description: "Authentication and authorization patterns"

# ═══════════════════════════════════════════════════════════════
# LOADING CONFIGURATION
# ═══════════════════════════════════════════════════════════════

loading:
  strategy: conditional     # jit → conditional
  fallback: core            # If no match, load core only
  max_sections: 2           # Max sections per request (core + 1)
  max_total_tokens: 5000    # Hard limit

cross_references:
  - "[[typescript/decorators]]"
  - "[[nodejs/modules]]"
  - "[[prisma/integration]]"
