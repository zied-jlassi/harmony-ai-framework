# Fastify Profile - Level 2
profile:
  id: fastify
  name: "Fastify"
  version: "4.x"
  category: backend
  level: 2
  description: "Fastify - fast Node.js framework, plugins, schema validation"
  last_updated: null

dependencies:
  required: [javascript, nodejs]
  optional: [typescript]
