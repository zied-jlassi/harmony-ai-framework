          score: 0.75
        - word: structure
          score: 0.70
        - word: technical decision
          score: 0.90
        - word: component
          score: 0.70
        - word: system design
          score: 0.90
        - word: integration
          score: 0.75

      fr:
        - word: architecture
          score: 0.95
        - word: conception
          score: 0.85
        - word: concevoir
          score: 0.85
        - word: adr
          score: 0.95
        - word: pattern
          score: 0.75
        - word: structurer
          score: 0.75
        - word: decision technique
          score: 0.90
        - word: composant
          score: 0.70

    regex:
      - pattern: "(?:design|concevoir|architect)\\s+(?:the|le|la|une)?\\s*(?:system|architecture|solution)"
        score: 0.95
      - pattern: "(?:create|creer)\\s+(?:an?|un|une)?\\s*adr"
        score: 0.95
      - pattern: "(?:technical|technique)\\s+(?:decision|choix)"
        score: 0.90

    context:
