name: test-architect-nfr-assess
description: "Évalue et teste les exigences non-fonctionnelles : performance (k6/Gatling), sécurité (OWASP ZAP/SAST), accessibilité (WCAG 2.1/Axe), fiabilité et scalabilité"
author: "Harmony Framework"
version: "1.0"

config_source: "{project-root}/.harmony/config.yaml"
communication_language: "{config_source}:communication_language"
user_name: "{config_source}:user_name"
document_output_language: "{config_source}:document_output_language"

installed_path: "{project-root}/.harmony/workflows/test-architect/nfr-assess"
instructions: "{installed_path}/instructions.md"
validation: "{installed_path}/checklist.md"

# nfr_type: performance | security | accessibility | reliability | all
nfr_type: "all"
output_report: ""  # Auto-généré si vide

standalone: true
