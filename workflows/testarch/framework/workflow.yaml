name: testarch-framework
description: "Sélectionne, installe et configure le framework de test adapté au stack du projet"
author: "Harmony Framework"
version: "1.0"

config_source: "{project-root}/.harmony/config.yaml"
communication_language: "{config_source}:communication_language"
user_name: "{config_source}:user_name"
document_output_language: "{config_source}:document_output_language"

installed_path: "{project-root}/.harmony/workflows/testarch/framework"
instructions: "{installed_path}/instructions.md"
validation: "{installed_path}/checklist.md"

# Détection automatique si non fourni
target_framework: "" # jest|vitest|playwright|cypress|pytest|junit|go-test|rspec|cargo-test

standalone: true
