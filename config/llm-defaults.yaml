# =============================================================================
# MODEL KEYS - Constants used in agents
# =============================================================================
# Agents use these keys: model_1, model_2, model_3
# Change the alias to switch all agents using that key
#
# Example agent file:
#   model: model_1
#
# To switch all model_1 agents to ChatGPT:
#   model_1: chatgpt

# Model keys can be:
#   - Single alias: model_1: opus
#   - Array with fallback: model_1: [opus, chatgpt, groq-large]
#     (tries first, if token limit → next in list)

model_keys:
  model_1: [opus]              # Complex tasks - add fallbacks: [opus, chatgpt]
  model_2: [sonnet]            # Standard tasks - add fallbacks: [sonnet, chatgpt]
  model_3: [haiku]             # Fast tasks - add fallbacks: [haiku, chatgpt-mini]
  inherit: model_2             # Default fallback (uses model_2)

# =============================================================================
# HOW TO USE
# =============================================================================
#
# 1. ADD A NEW MODEL
#    ----------------
#    Uncomment or add a model with a unique alias:
#
#    - name: "gpt-4o"
#      alias: chatgpt
#      provider: openai
#      api_key_env: OPENAI_API_KEY
#
# 2. USE IT IN AN AGENT
#    -------------------
#    Option A: Change model_keys to affect all agents of that tier:
#
#      model_keys:
#        model_1: chatgpt  # All model_1 agents now use ChatGPT
#
#    Option B: Use alias directly in a specific agent:
#
#      # In agents/analyst.md
#      model: chatgpt
#
# 3. ENVIRONMENT VARIABLES
#    ----------------------
#    Set the required API key for your provider:
#
#    export OPENAI_API_KEY=sk-xxx
#    export GROQ_API_KEY=gsk_xxx
#    export MISTRAL_API_KEY=xxx
#    export DEEPSEEK_API_KEY=xxx
#
# =============================================================================
# LOCAL OVERRIDE
# =============================================================================
# Create .harmony/local/llm-config.yaml to override for a specific project:
#
# models:
#   - name: "gpt-4o"
#     alias: chatgpt
#     provider: openai
#     api_key_env: OPENAI_API_KEY
#
# model_keys:
#   model_1: chatgpt
#   model_2: sonnet
#   model_3: haiku
