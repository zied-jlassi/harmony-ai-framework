# AI Systems Specialty
# Purpose: Knowledge for building AI/LLM applications
# Version: 1.0.0

specialty:
  id: ai
  name: "AI Systems"
  version: "1.0.0"
  description: "Expertise for building AI/LLM applications: RAG, Memory, Orchestration, Safety"

# Detection: When to activate this specialty
detection:
  package_has:
    - langchain
    - llama-index
    - llamaindex
    - openai
    - anthropic
    - "@anthropic-ai/sdk"
    - chromadb
    - pinecone
    - pinecone-client
    - weaviate-client
    - qdrant-client
    - mem0
    - "@langchain/core"
    - transformers
    - sentence-transformers

  file_patterns:
    - "**/rag/**"
    - "**/embeddings/**"
    - "**/vector/**"
    - "**/llm/**"
    - "**/agents/**/*.py"  # Python AI agents

  config_indicators:
    - is_ai: true

# Context set when specialty is active
sets:
  is_ai: true
  specialty: ai

# Agent enhancement
agent_mapping:
  architect: ai-architect  # Uses AI Architect instead of standard

# Knowledge domains loaded (15 domains)
knowledge:
  domains:
    # CORE PATTERNS
    - id: rag
      file: ../../knowledge/domains/ai/rag-patterns.md
      keywords: [rag, retrieval, vector, embedding, chunking, reranking]
      description: "RAG pipelines, Vector DBs, Embeddings"

    - id: memory
      file: ../../knowledge/domains/ai/memory-patterns.md
      keywords: [memory, context, session, conversation, mem0, memgpt]
      description: "3-Tier Memory, Mem0, Context Management"

    - id: orchestration
      file: ../../knowledge/domains/ai/orchestration-patterns.md
      keywords: [orchestration, multi-agent, handoff, supervisor, swarm, crew]
      description: "Multi-Agent Systems, Handoffs, HOAF"

    - id: safety
      file: ../../knowledge/domains/ai/safety-patterns.md
      keywords: [safety, guardrails, injection, hallucination, constitutional]
      description: "Guardrails, Prompt Injection, Safety"

    - id: observability
      file: ../../knowledge/domains/ai/observability-patterns.md
      keywords: [observability, tracing, langsmith, evaluation, metrics, monitoring]
      description: "LLM Observability, Tracing, Evaluation"

    - id: graphrag
      file: ../../knowledge/domains/ai/graphrag-patterns.md
      keywords: [graph, knowledge graph, neo4j, entity, multi-hop]
      description: "Knowledge Graphs, GraphRAG, Entity Extraction"

    # AGENTIC & PROMPTING
    - id: agentic
      file: ../../knowledge/domains/ai/agentic-patterns.md
      keywords: [agent, react, reflexion, plan, execute, autonomous, tool use]
      description: "Agentic AI, ReAct, Reflexion, Plan-Execute"

    - id: prompt-engineering
      file: ../../knowledge/domains/ai/prompt-engineering-patterns.md
      keywords: [prompt, few-shot, chain of thought, dspy, ape, opro, template]
      description: "Prompt Engineering, DSPy, APE, CoT"

    # PRODUCTION & OPS
    - id: llmops
      file: ../../knowledge/domains/ai/llmops-patterns.md
      keywords: [llmops, ci, cd, deployment, versioning, lifecycle, production]
      description: "LLMOps, CI/CD, Versioning, Lifecycle"

    - id: evaluation
      file: ../../knowledge/domains/ai/evaluation-patterns.md
      keywords: [evaluation, benchmark, llm-as-judge, ragas, bleu, rouge, human eval]
      description: "LLM Evaluation, Benchmarks, RAGAS"

    - id: finetuning
      file: ../../knowledge/domains/ai/finetuning-patterns.md
      keywords: [finetuning, rlhf, lora, qlora, dpo, peft, alignment, sft]
      description: "Fine-tuning, RLHF, LoRA, QLoRA, DPO"

    - id: tool-integration
      file: ../../knowledge/domains/ai/tool-integration-patterns.md
      keywords: [tool, function calling, mcp, api, integration, plugin]
      description: "Function Calling, MCP, Tool Use, APIs"

    - id: cost-optimization
      file: ../../knowledge/domains/ai/cost-optimization-patterns.md
      keywords: [cost, optimization, routing, cache, semantic cache, token, budget]
      description: "Cost Optimization, LLM Routing, Caching"

    # ADVANCED
    - id: streaming
      file: ../../knowledge/domains/ai/streaming-patterns.md
      keywords: [streaming, real-time, sse, websocket, ttft, progressive]
      description: "Streaming, Real-time, SSE, WebSockets"

    - id: multimodal
      file: ../../knowledge/domains/ai/multimodal-patterns.md
      keywords: [multimodal, vision, image, audio, video, document, ocr]
      description: "Vision, Audio, Video, Multimodal AI"

# How knowledge is loaded
loading:
  strategy: on_demand  # Load only when keywords detected
  fallback: rag        # Default domain if ambiguous
  max_domains: 5       # Max domains loaded at once
