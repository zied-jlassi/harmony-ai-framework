# React Profile - Centralized Knowledge Model
# ═══════════════════════════════════════════════════════════════
#
# Knowledge centralisé dans knowledge/ (nouveau modèle)
# Override possible via .harmony/local/profiles/frontend/react/
#
# ═══════════════════════════════════════════════════════════════

profile:
  id: react
  name: "React"
  category: frontend
  level: 2
  description: "React - A JavaScript library for building user interfaces"
  last_updated: "2026-01-05"

  requires: [javascript]
  optional: [typescript, nextjs]

# ═══════════════════════════════════════════════════════════════
# VERSIONING - CRITIQUE pour React
# ═══════════════════════════════════════════════════════════════
versioning:
  latest: "19.x"
  lts: "18.x"

  versions:
    "19.x":
      released: "2024-12"
      node_min: "18.x"
      features: ["use() hook", "Actions", "Server Components stable", "useFormStatus", "useOptimistic"]
    "18.x":
      released: "2022-03"
      node_min: "14.x"
      features: ["Concurrent rendering", "Suspense for data", "Transitions", "useId", "useSyncExternalStore"]
    "17.x":
      deprecated: true
      node_min: "10.x"
      features: ["Legacy JSX transform"]

  detection:
    file: "package.json"
    path: "dependencies.react"
    fallback: "latest"

  context7:
    default: "/websites/react_dev"
    reference: "/websites/react_dev_reference"
    "18.x": "/websites/18_react_dev"
    version_hint: true

  fallback_urls:
    latest: "https://react.dev/"
    "18.x": "https://18.react.dev/"
    legacy: "https://legacy.reactjs.org/"

dependencies:
  required:
    - javascript
  optional:
    - typescript
    - nextjs

# ═══════════════════════════════════════════════════════════════
# KNOWLEDGE - Références centralisées
# ═══════════════════════════════════════════════════════════════
knowledge:
  # Chemins relatifs à knowledge/ (centralisé)
  base_path: knowledge/

  # Knowledge framework (toujours chargé)
  core:
    - frameworks/react/react-state-management.md
    - languages/javascript/modern-javascript-patterns.md

  # Knowledge partagé
  shared:
    - shared/patterns/error-handling-patterns.md

  # Chargement par intent
  on_intent:
    SECURITY:
      - domains/security/owasp-top10.md
    TEST:
      - languages/javascript/javascript-testing-patterns.md
    IMPLEMENT:
      - frameworks/react/react-state-management.md

  # Override local (équipe)
  override:
    enabled: true
    path: .harmony/local/profiles/frontend/react/knowledge/

# ═══════════════════════════════════════════════════════════════
# CONTEXT7 INTEGRATION (Docs Officielles On-Demand)
# ═══════════════════════════════════════════════════════════════
context7:
  enabled: true
  library_id: "/websites/react_dev"

  suggested_queries:
    IMPLEMENT:
      - "components props children"
      - "hooks useState useEffect"
    STATE:
      - "state management useReducer"
      - "context API createContext"
    FORMS:
      - "forms controlled components"
      - "useActionState useFormStatus"
    PERFORMANCE:
      - "useMemo useCallback optimization"
      - "React.memo lazy Suspense"
    TEST:
      - "testing library jest"

# ═══════════════════════════════════════════════════════════════
# SENTINEL INTEGRATION
# ═══════════════════════════════════════════════════════════════
sentinel:
  watch_tags:
    - react
    - javascript
    - typescript
    - frontend
    - hooks
    - jsx
    - state

  auto_sync:
    enabled: true
    target: .harmony/local/profiles/frontend/react/knowledge/experience/
    on_new_error: true

# ═══════════════════════════════════════════════════════════════
# SOURCES PROFESSIONNELLES (pour /harmony learn)
# ═══════════════════════════════════════════════════════════════
learn_sources:
  recommended:
    - url: "https://react.dev/learn"
      topics: ["fundamentals", "thinking in react"]
    - url: "https://react.dev/reference/react"
      topics: ["hooks", "components", "APIs"]

  search_queries:
    - "React best practices enterprise 2025"
    - "React hooks patterns advanced"
    - "React state management comparison"
