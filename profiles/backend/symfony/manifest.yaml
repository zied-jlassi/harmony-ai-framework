# Symfony Profile - Centralized Knowledge Model
# ═══════════════════════════════════════════════════════════════
#
# Knowledge centralisé dans knowledge/ (nouveau modèle)
# Override possible via .harmony/local/profiles/backend/symfony/
#
# ═══════════════════════════════════════════════════════════════

profile:
  id: symfony
  name: "Symfony"
  category: backend
  level: 2
  description: "Symfony - PHP framework for web applications"
  last_updated: "2026-01-05"

  requires: [php]
  optional: [doctrine, twig]

# ═══════════════════════════════════════════════════════════════
# VERSIONING - Pour Context7 Queries
# ═══════════════════════════════════════════════════════════════
versioning:
  latest: "7.4"
  lts: "6.4"

  versions:
    "7.4":
      released: "2024-11"
      php_min: "8.2"
      features: ["attributes routing", "autowire", "mapRequestPayload"]
    "6.4":
      released: "2023-11"
      php_min: "8.1"
      features: ["LTS", "attributes", "autowiring"]
      lts_until: "2027-11"
    "5.4":
      deprecated: true
      php_min: "7.2.5"
      features: ["annotations", "autowiring"]

  detection:
    file: "composer.json"
    path: "require.symfony/framework-bundle"
    fallback: "latest"

  context7:
    default: "/websites/symfony_doc"
    "7.4": "/websites/symfony_doc_7_4"
    "6.4": "/websites/symfony_doc_6_4"
    "5.x": "/websites/symfony_doc_5_x"
    version_hint: true

  fallback_urls:
    latest: "https://symfony.com/doc/current/"
    "6.4": "https://symfony.com/doc/6.4/"
    "5.4": "https://symfony.com/doc/5.4/"

dependencies:
  required:
    - php
  optional:
    - doctrine
    - twig

# ═══════════════════════════════════════════════════════════════
# KNOWLEDGE - Références centralisées
# ═══════════════════════════════════════════════════════════════
knowledge:
  # Chemins relatifs à knowledge/ (centralisé)
  base_path: knowledge/

  # Knowledge framework (toujours chargé)
  core:
    - frameworks/symfony/architecture.md

  # Knowledge partagé
  shared:
    - shared/patterns/api-design-principles.md
    - shared/patterns/error-handling-patterns.md

  # Chargement par intent
  on_intent:
    SECURITY:
      - domains/security/owasp-top10.md
      - domains/security/owasp-checklists.md
    TEST:
      - shared/patterns/error-handling-patterns.md
    DATABASE:
      - shared/patterns/sql-optimization-patterns.md

  # Override local (équipe)
  override:
    enabled: true
    path: .harmony/local/profiles/backend/symfony/knowledge/

# ═══════════════════════════════════════════════════════════════
# CONTEXT7 INTEGRATION (Docs Officielles On-Demand)
# ═══════════════════════════════════════════════════════════════
context7:
  enabled: true
  library_id: "/websites/symfony_doc"

  suggested_queries:
    SECURITY:
      - "authentication security voters"
      - "authorization access control"
    IMPLEMENT:
      - "controllers routing attributes"
      - "dependency injection autowire"
    DATABASE:
      - "doctrine ORM entities"
      - "migrations repositories"
    FORMS:
      - "forms validation constraints"
    TEST:
      - "testing phpunit functional"

# ═══════════════════════════════════════════════════════════════
# SENTINEL INTEGRATION
# ═══════════════════════════════════════════════════════════════
sentinel:
  watch_tags:
    - symfony
    - php
    - doctrine
    - twig
    - api
    - security

  auto_sync:
    enabled: true
    target: .harmony/local/profiles/backend/symfony/knowledge/experience/
    on_new_error: true

# ═══════════════════════════════════════════════════════════════
# SOURCES PROFESSIONNELLES (pour /harmony learn)
# ═══════════════════════════════════════════════════════════════
learn_sources:
  recommended:
    - url: "https://symfony.com/doc/current/best_practices.html"
      topics: ["architecture", "conventions"]
    - url: "https://symfony.com/doc/current/controller.html"
      topics: ["controllers", "routing"]

  search_queries:
    - "Symfony best practices enterprise 2025"
    - "Symfony security authentication patterns"
    - "Symfony API Platform integration"
