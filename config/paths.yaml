# =============================================================================
# Harmony Framework - Path Configuration
# =============================================================================
# Framework: .harmony/...          (read-only, shared)
# User data: .harmony/local/...    (mutable, project-specific)
# =============================================================================

version: "1.0"

# Framework paths (read-only)
framework:
  root: ".harmony"
  agents: ".harmony/agents"
  config: ".harmony/config"
  templates: ".harmony/templates"

# User data paths (mutable)
local:
  root: ".harmony/local"

  # Backlog (nested structure: epics/EP-XXX-slug/stories/)
  backlog: ".harmony/local/backlog"
  epics: ".harmony/local/backlog/epics"
  # Stories are nested inside their epic folder:
  # .harmony/local/backlog/epics/EP-XXX-slug/stories/

  # Documentation
  docs: ".harmony/local/docs"
  prd: ".harmony/local/docs/prd"
  research: ".harmony/local/docs/research"
  analysis: ".harmony/local/docs/analysis"
  architecture: ".harmony/local/docs/architecture"
  briefs: ".harmony/local/docs/briefs"
  ucv: ".harmony/local/docs/ucv"

# Memory (ADR-010: user data in local/memory/)
memory:
  root: ".harmony/local/memory"
  templates: ".harmony/templates/memory"
  workflow_state: ".harmony/local/memory/workflow-state.json"
  circuit_breaker: ".harmony/local/memory/circuit-breaker.json"
  error_journal: ".harmony/local/memory/error-journal.json"
  learned_patterns: ".harmony/local/memory/learned-patterns.json"
  user_preferences: ".harmony/local/memory/user-preferences.json"
  working: ".harmony/local/memory/working.json"

# Default epic when no context
defaults:
  epic_id: "EP-HANDOFF"
  epic_name: "Handoff Default Epic"
