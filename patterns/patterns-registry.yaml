# =============================================================================
# Harmony Patterns Registry
# =============================================================================
# This registry enables AUTOMATIC pattern matching when errors occur.
# Sentinel uses this to suggest/apply fixes intelligently.
#
# Structure:
#   - id: Pattern ID
#   - triggers: Keywords/regex that activate this pattern
#   - file_types: File extensions this applies to
#   - error_patterns: Regex patterns to match error messages
#   - quick_fix: Immediate fix suggestion
#   - doc: Full documentation path
# =============================================================================

version: "1.0.0"
description: "Smart pattern matching for auto-resolution"

patterns:
  # ─────────────────────────────────────────────────────────────────────────
  # BASH PATTERNS
  # ─────────────────────────────────────────────────────────────────────────

  - id: PAT-BASH-001
    name: "Bash set -e arithmetic"
    category: bash
    file_types: [".sh", ".bash"]
    triggers:
      - "set -e"
      - "((.*++))"
      - "((.*--))"
    error_patterns:
      - "exit code 1"
      - "script.*exit.*unexpect"
      - "command.*failed"
    detection_code: |
      grep -E '\(\([a-zA-Z_]+\+\+\)\)|\(\([a-zA-Z_]+--\)\)' "$FILE"
    quick_fix:
      description: "Replace ((var++)) with var=$((var + 1))"
      search: '\(\(([a-zA-Z_]+)\+\+\)\)'
      replace: '\1=$((\1 + 1))'
    doc: "patterns/P-011-cross-platform.md#11-arithmetic-with-set--e"
    severity: critical

  - id: PAT-BASH-002
    name: "macOS sha256sum missing"
    category: bash
    file_types: [".sh", ".bash"]
    triggers:
      - "sha256sum"
      - "checksum"
    error_patterns:
      - "sha256sum.*not found"
      - "sha256sum.*command not found"
      - "No such file.*sha256sum"
    quick_fix:
      description: "Use cross-platform sha256 function"
      suggestion: |
        sha256_cmd() {
            command -v sha256sum &>/dev/null && sha256sum "$@" || shasum -a 256 "$@"
        }
    doc: "patterns/P-011-cross-platform.md#12-sha256-checksums"
    severity: high

  - id: PAT-BASH-003
    name: "macOS readlink -f missing"
    category: bash
    file_types: [".sh", ".bash"]
    triggers:
      - "readlink -f"
      - "readlink --canonicalize"
    error_patterns:
      - "readlink.*illegal option"
      - "readlink.*-f.*not recognized"
    quick_fix:
      description: "Use manual symlink resolution loop"
      search: 'readlink -f'
      replace: '# See P-011 for portable readlink'
    doc: "patterns/P-011-cross-platform.md#13-symlink-resolution"
    severity: high

  - id: PAT-BASH-004
    name: "macOS sed -i syntax"
    category: bash
    file_types: [".sh", ".bash"]
    triggers:
      - "sed -i"
    error_patterns:
      - "sed.*undefined label"
      - "sed.*extra characters"
      - "sed.*-i.*expects"
    quick_fix:
      description: "Use sed -i'' (no space) for cross-platform"
      search: "sed -i '"
      replace: "sed -i'' '"
    doc: "patterns/P-011-cross-platform.md#14-sed-in-place"
    severity: medium

  - id: PAT-BASH-005
    name: "grep exit code with set -e"
    category: bash
    file_types: [".sh", ".bash"]
    triggers:
      - "grep"
      - "set -e"
    error_patterns:
      - "grep.*exit.*1"
      - "no matches found"
    quick_fix:
      description: "Add || true after grep"
      search: '(grep [^|]+)$'
      replace: '\1 || true'
    doc: "patterns/P-011-cross-platform.md#14-grep-exit-code"
    severity: medium

  # ─────────────────────────────────────────────────────────────────────────
  # TYPESCRIPT/JAVASCRIPT PATTERNS
  # ─────────────────────────────────────────────────────────────────────────

  - id: PAT-TS-001
    name: "Path alias not configured"
    category: typescript
    file_types: [".ts", ".tsx", ".js", ".jsx"]
    triggers:
      - "@/"
      - "Cannot find module"
    error_patterns:
      - "Cannot find module '@/"
      - "Module not found.*@/"
    quick_fix:
      description: "Add paths config to tsconfig.json"
      suggestion: |
        {
          "compilerOptions": {
            "baseUrl": "./src",
            "paths": { "@/*": ["*"] }
          }
        }
    doc: "patterns/P-011-cross-platform.md"
    severity: high

  # ─────────────────────────────────────────────────────────────────────────
  # NPM/PACKAGING PATTERNS
  # ─────────────────────────────────────────────────────────────────────────

  - id: PAT-NPM-001
    name: "Directory not in package.json files"
    category: npm
    file_types: ["package.json"]
    triggers:
      - "npm publish"
      - "Directory not found"
    error_patterns:
      - "Directory not found"
      - "ENOENT.*node_modules"
      - "file not found after publish"
    quick_fix:
      description: "Add directory to package.json files array"
      suggestion: "Check new directories are in package.json 'files' array"
    doc: "patterns/P-011-cross-platform.md"
    severity: high

# =============================================================================
# MATCHING ALGORITHM (for sentinel hooks)
# =============================================================================
#
# 1. On ERROR detected:
#    a. Get file extension
#    b. Filter patterns by file_types
#    c. Check triggers in file content
#    d. Match error_patterns against error message
#
# 2. On MATCH:
#    a. Display pattern name and severity
#    b. Show quick_fix suggestion
#    c. Offer to apply fix (if search/replace defined)
#    d. Link to full documentation
#
# 3. Learn:
#    a. If fix applied successfully, increment pattern usage count
#    b. Store in learned-patterns.json for project-specific tuning
# =============================================================================
