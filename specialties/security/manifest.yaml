# Security Specialty Pack
# Domain expertise for security testing, pentesting, and compliance
# Migrated from BMAD - 2026-01-01

specialty:
  id: security
  name: "Security"
  version: "1.0.0"
  description: "Security testing, penetration testing, OWASP compliance, RGPD, infrastructure security"
  last_updated: "2026-01-01"

# Branchs (specialized roles within security domain)
branchs:
  - id: engineer
    file: branchs/engineer.md
    description: "Security Engineer - implementation, defense-in-depth"

  - id: auditor
    file: branchs/auditor.md
    description: "Security Auditor - OWASP audits, vulnerability assessment"

  - id: researcher
    file: branchs/researcher.md
    description: "Security Researcher - pentest, red team, exploitation"

  - id: dpo
    file: branchs/dpo.md
    description: "Data Protection Officer - RGPD/GDPR compliance"

# Modules (specialized knowledge packs for pentest)
modules:
  web:
    - id: pentest-web
      file: modules/pentest-web.md
      description: "Web application security testing (OWASP Top 10)"
    - id: pentest-dast-scanners
      file: modules/pentest-dast-scanners.md
      description: "Dynamic Application Security Testing scanners"
    - id: pentest-dast-signatures
      file: modules/pentest-dast-signatures.md
      description: "DAST attack signatures"
    - id: pentest-dast-waf
      file: modules/pentest-dast-waf.md
      description: "WAF bypass techniques"
    - id: pentest-dast-recon
      file: modules/pentest-dast-recon.md
      description: "DAST reconnaissance"

  network:
    - id: pentest-network
      file: modules/pentest-network.md
      description: "Network security testing"
    - id: pentest-recon
      file: modules/pentest-recon.md
      description: "Reconnaissance and OSINT"

  exploitation:
    - id: pentest-exploit
      file: modules/pentest-exploit.md
      description: "Exploitation techniques"
    - id: pentest-metasploit
      file: modules/pentest-metasploit.md
      description: "Metasploit Framework"
    - id: pentest-post
      file: modules/pentest-post.md
      description: "Post-exploitation"

  specialized:
    - id: pentest-crypto
      file: modules/pentest-crypto.md
      description: "Cryptographic security testing"
    - id: pentest-social
      file: modules/pentest-social.md
      description: "Social engineering"
    - id: pentest-malware
      file: modules/pentest-malware.md
      description: "Malware analysis"
    - id: pentest-forensics
      file: modules/pentest-forensics.md
      description: "Digital forensics"

  sources:
    - id: pentest-sources
      file: modules/pentest-sources.json
      description: "Research sources for pentest knowledge"

# Knowledge base (references to shared knowledge)
knowledge:
  source: ../../knowledge/domains/security
  general:
    - id: owasp-checklists
      file: ../../knowledge/domains/security/owasp-checklists.md
      description: "OWASP security checklists"
    - id: cis-benchmarks
      file: ../../knowledge/domains/security/cis-benchmarks.md
      description: "CIS security benchmarks"
    - id: data-protection
      file: ../../knowledge/domains/security/data-protection.md
      description: "Data protection patterns"
    - id: infrastructure
      file: ../../knowledge/domains/security/infrastructure.md
      description: "Infrastructure security"
    - id: patterns-detection
      file: ../../knowledge/domains/security/patterns-detection.md
      description: "Attack pattern detection"
    - id: pentest-patterns
      file: ../../knowledge/domains/security/pentest-patterns.md
      description: "Penetration testing patterns"

  gaming:
    - id: owasp-gaming-checklist
      file: ../../knowledge/domains/security/owasp-gaming-checklist.md
      description: "OWASP checklist for gaming platforms"
    - id: owasp-gaming-checklists
      file: ../../knowledge/domains/security/owasp-gaming-checklists.md
      description: "Extended OWASP gaming checklists"
    - id: gaming-security-patterns
      file: ../../knowledge/domains/security/gaming-security-patterns.md
      description: "Security patterns specific to gaming"
    - id: data-protection-gaming
      file: ../../knowledge/domains/security/data-protection-gaming.md
      description: "Data protection for gaming (COPPA, minors)"

# Integration with Harmony
harmony_integration:
  triggers:
    - "pentest"
    - "security audit"
    - "vulnerability"
    - "OWASP"
    - "penetration test"
    - "RGPD"
    - "GDPR"
    - "data protection"
    - "compliance"

  phases:
    - phase: 3  # Solutioning
      role: "Security architecture review"
    - phase: 4  # Implementation
      role: "Security testing and validation"

  # Note: This specialty is self-contained
  # Agents load their own modules and knowledge as needed

# Statistics
stats:
  branchs: 4
  modules: 15
  knowledge_files: 10
  total_files: 30

# Usage
usage:
  invoke: "/harmony:specialty:security"
  branchs:
    - "/harmony:security:engineer"
    - "/harmony:security:auditor"
    - "/harmony:security:researcher"
    - "/harmony:security:dpo"

  examples:
    - "Perform OWASP Top 10 assessment"
    - "Test API authentication security"
    - "Audit network infrastructure"
    - "Review cryptographic implementation"
    - "Check RGPD compliance for user data"
    - "Analyze gaming platform security"
