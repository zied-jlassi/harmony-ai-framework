# Harmony Framework - TestArch Commands Registry
# Usage: /hf:testarch:<name> [arguments]
# These are aliases pointing to existing test architecture workflows

version: "1.0"
prefix: "/hf:testarch"

testarch:
  # Test Framework Setup
  framework:
    path: workflows/testarch/framework/workflow.yaml
    description: "Initialize test framework - Jest, Vitest, Playwright setup"
    arguments: "[framework: jest|vitest|playwright]"
    phase: 4
    requires: []

  # ATDD Workflow
  atdd:
    path: workflows/testarch/atdd/workflow.yaml
    description: "Acceptance Test Driven Development workflow"
    arguments: "[story-id]"
    phase: 4
    requires: [story-exists]

  # Test Automation
  automate:
    path: workflows/testarch/automate/workflow.yaml
    description: "Automate manual test cases - generate test code"
    arguments: "[test-scope]"
    phase: 4
    requires: [tests-designed]

  # CI/CD Integration
  ci:
    path: workflows/testarch/ci/workflow.yaml
    description: "Setup CI/CD pipeline for tests - GitHub Actions, GitLab CI"
    arguments: "[platform: github|gitlab]"
    phase: 4
    requires: [tests-exist]

  # Test Design
  test-design:
    path: workflows/testarch/test-design/workflow.yaml
    description: "Design test cases from requirements"
    arguments: "[story-or-feature]"
    phase: 4
    requires: [requirements-exist]

  # Test Review
  test-review:
    path: workflows/testarch/test-review/workflow.yaml
    description: "Review test quality and coverage"
    arguments: "[scope]"
    phase: 4
    requires: [tests-exist]

  # NFR Assessment
  nfr-assess:
    path: workflows/testarch/nfr-assess/workflow.yaml
    description: "Non-functional requirements assessment - performance, security"
    arguments: "[nfr-type: performance|security|accessibility]"
    phase: 4
    requires: []

  # Traceability
  trace:
    path: workflows/testarch/trace/workflow.yaml
    description: "Requirements to tests traceability matrix"
    arguments: "[scope]"
    phase: 4
    requires: [tests-exist]

# Example usage:
# /hf:testarch:framework jest
# /hf:testarch:atdd STORY-042
# /hf:testarch:ci github
# /hf:testarch:nfr-assess performance
