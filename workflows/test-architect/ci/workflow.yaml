name: test-architect-ci
description: "Configure les pipelines CI/CD de test sur GitHub Actions et/ou GitLab CI selon l'architecture 4 couches (suite, exécution, environnement, observabilité)"
author: "Harmony Framework"
version: "1.0"

config_source: "{project-root}/.harmony/config.yaml"
communication_language: "{config_source}:communication_language"
user_name: "{config_source}:user_name"
document_output_language: "{config_source}:document_output_language"

installed_path: "{project-root}/.harmony/workflows/test-architect/ci"
instructions: "{installed_path}/instructions.md"
validation: "{installed_path}/checklist.md"

# platform: github | gitlab | both
platform: "github"
coverage_threshold: 80
enable_parallel: true
enable_caching: true

standalone: true
