# Mobile Specialty Pack
# Mobile app development expertise

specialty:
  id: mobile
  name: "Mobile"
  version: "1.0.0"
  description: "Mobile app development, cross-platform frameworks, native patterns"

# Agents included in this specialty
agents:
  - id: mobile
    file: agents/mobile.md
    description: "Mobile development expert for iOS, Android, and cross-platform"

# Knowledge sources
knowledge:
  topics:
    - react-native     # Cross-platform React
    - flutter          # Cross-platform Dart
    - ios              # Native iOS/Swift
    - android          # Native Android/Kotlin
    - pwa              # Progressive Web Apps
    - responsive       # Responsive design
    - touch-ux         # Touch interactions
    - offline          # Offline-first patterns

  sources:
    - url: "https://reactnative.dev/docs/"
      priority: 1
    - url: "https://flutter.dev/docs"
      priority: 2
    - url: "https://developer.apple.com/documentation/"
      priority: 3
    - url: "https://developer.android.com/docs"
      priority: 4

# Patterns
patterns:
  - id: offline-first
    description: "Offline-first data synchronization"
  - id: responsive-mobile
    description: "Mobile-first responsive design"
  - id: native-bridge
    description: "Native module integration patterns"
