# R-013: Secrets Protection
# Prevents exposure of API tokens, passwords, and sensitive data

id: R-013
name: Secrets Protection
version: 1.0.0
status: active
severity: critical
enforcement: block

description: |
  Protects sensitive data from accidental exposure in prompts and outputs.
  Blocks commands that would display secrets and prevents committing secrets.
  This rule is MANDATORY to prevent credential leakage.

sensitive_files:
  # Environment files (NEVER display)
  - pattern: ".env"
    description: "Environment variables"
  - pattern: ".env.*"
    description: "Environment variants"
  - pattern: ".env.local"
    description: "Local environment"
  - pattern: ".env.prod*"
    description: "Production environment"
  - pattern: ".env.preprod*"
    description: "Pre-production environment"

  # Credential files
  - pattern: "credentials*"
    description: "Credentials file"
  - pattern: "secrets*"
    description: "Secrets file"
  - pattern: ".aws/credentials"
    description: "AWS credentials"
  - pattern: ".aws/config"
    description: "AWS config"

  # SSH/GPG keys
  - pattern: ".ssh/id_*"
    description: "SSH private keys"
  - pattern: ".gnupg/*"
    description: "GPG keys"
  - pattern: "*.pem"
    description: "PEM certificates"
  - pattern: "*.key"
    description: "Private keys"

  # Package manager tokens
  - pattern: ".npmrc"
    description: "NPM config (may contain tokens)"
  - pattern: ".pypirc"
    description: "PyPI config"
  - pattern: ".netrc"
    description: "Network credentials"

sensitive_env_vars:
  # API Keys
  - "API_KEY"
  - "API_SECRET"
  - "SECRET_KEY"
  - "PRIVATE_KEY"
  - "ACCESS_KEY"

  # Service-specific
  - "AWS_SECRET_ACCESS_KEY"
  - "AWS_ACCESS_KEY_ID"
  - "GITHUB_TOKEN"
  - "GITLAB_TOKEN"
  - "NPM_TOKEN"
  - "OPENAI_API_KEY"
  - "ANTHROPIC_API_KEY"
  - "STRIPE_SECRET_KEY"
  - "SENDGRID_API_KEY"

  # Database
  - "DATABASE_URL"
  - "DATABASE_PASSWORD"
  - "MONGO_URI"
  - "REDIS_URL"
  - "REDIS_PASSWORD"

  # Auth
  - "JWT_SECRET"
  - "SESSION_SECRET"
  - "ENCRYPTION_KEY"
  - "PASSWORD"
  - "PASSWD"

secret_patterns:
  # OpenAI
  - pattern: 'sk-[a-zA-Z0-9]{32,}'
    description: "OpenAI API key"

  # Anthropic
  - pattern: 'sk-ant-[a-zA-Z0-9-]{32,}'
    description: "Anthropic API key"

  # Stripe
  - pattern: 'sk_live_[a-zA-Z0-9]+'
    description: "Stripe live key"
  - pattern: 'sk_test_[a-zA-Z0-9]+'
    description: "Stripe test key"

  # AWS
  - pattern: 'AKIA[0-9A-Z]{16}'
    description: "AWS Access Key"
  - pattern: '[a-zA-Z0-9/+=]{40}'
    description: "AWS Secret Key (40 chars)"

  # GitHub
  - pattern: 'ghp_[a-zA-Z0-9]{36}'
    description: "GitHub Personal Access Token"
  - pattern: 'gho_[a-zA-Z0-9]{36}'
    description: "GitHub OAuth Token"
  - pattern: 'ghs_[a-zA-Z0-9]{36}'
    description: "GitHub Server Token"

  # npm
  - pattern: 'npm_[a-zA-Z0-9]{36}'
    description: "npm token"

  # Generic
  - pattern: '[a-f0-9]{32}'
    description: "32-char hex (MD5, API keys)"
  - pattern: '[a-f0-9]{64}'
    description: "64-char hex (SHA256, secrets)"

rules:
  # SEC-1: Block cat of secret files
  - id: SEC-1
    name: No Display of Secret Files
    description: Block displaying secret files
    patterns:
      - 'cat\s+.*\.env'
      - 'cat\s+.*\.env\.\w+'
      - 'cat\s+.*credentials'
      - 'cat\s+.*secrets?'
      - 'cat\s+.*\.aws/'
      - 'cat\s+.*\.ssh/id_'
      - 'cat\s+.*\.netrc'
      - 'cat\s+.*\.npmrc'
      - 'cat\s+.*\.pypirc'
      - 'cat\s+.*\.pem$'
      - 'cat\s+.*\.key$'
    action: block
    message: |
      BLOCKED: Cannot display secret files.

      These files contain sensitive credentials that should never
      be shown in prompts or outputs.

      If you need to verify a secret exists:
        test -f .env && echo "File exists"

  # SEC-2: Block head/tail/less of secret files
  - id: SEC-2
    name: No Partial Display of Secrets
    description: Block partial display of secret files
    patterns:
      - 'head\s+.*\.env'
      - 'tail\s+.*\.env'
      - 'less\s+.*\.env'
      - 'more\s+.*\.env'
    action: block
    message: |
      BLOCKED: Cannot display any part of secret files.

  # SEC-3: Block echo of secret env vars
  - id: SEC-3
    name: No Echo of Secrets
    description: Block echoing secret environment variables
    patterns:
      - 'echo\s+\$\{?(API_KEY|API_SECRET|SECRET_KEY|PASSWORD|TOKEN|PRIVATE_KEY)'
      - 'echo\s+\$\{?(AWS_SECRET|GITHUB_TOKEN|NPM_TOKEN|OPENAI_API_KEY)'
      - 'echo\s+\$\{?(DATABASE_URL|MONGO_URI|REDIS_URL|DATABASE_PASSWORD)'
      - 'echo\s+\$\{?(JWT_SECRET|SESSION_SECRET|ENCRYPTION_KEY|ANTHROPIC_API_KEY)'
    action: block
    message: |
      BLOCKED: Cannot echo secret environment variables.

      If you need to check if a variable is set:
        test -n "$API_KEY" && echo "API_KEY is set"

  # SEC-4: Block printenv for secrets
  - id: SEC-4
    name: No printenv Secrets
    description: Block printenv for secret variables
    patterns:
      - 'printenv\s+(API_KEY|SECRET|TOKEN|PASSWORD|KEY)'
      - 'env\s*\|\s*grep.*(SECRET|TOKEN|PASSWORD|KEY)'
    action: block
    message: |
      BLOCKED: Cannot display secret environment variables.

  # SEC-5: Block grep in .env
  - id: SEC-5
    name: No grep in .env
    description: Block searching within .env files
    patterns:
      - 'grep.*\.env$'
      - 'grep.*\.env\s'
    action: block
    message: |
      BLOCKED: Cannot search within .env files.

  # SEC-6: Block git add of secrets
  - id: SEC-6
    name: No git add Secrets
    description: Block adding secret files to git
    patterns:
      - 'git\s+add\s+.*\.env$'
      - 'git\s+add\s+.*\.env\.'
      - 'git\s+add\s+.*\.env\.prod'
      - 'git\s+add\s+.*\.env\.preprod'
      - 'git\s+add\s+.*\.env\.production'
      - 'git\s+add\s+.*\.env\.staging'
      - 'git\s+add\s+.*credentials'
      - 'git\s+add\s+.*secrets/'
      - 'git\s+add\s+.*\.pem$'
      - 'git\s+add\s+.*\.key$'
      - 'git\s+add\s+.*id_rsa'
    action: block
    message: |
      BLOCKED: Cannot add secret files to git.

      These files should NEVER be committed:
        - .env files (use .env.example)
        - Credentials
        - Private keys

      Add to .gitignore:
        .env*
        !.env.example
        *.pem
        *.key

  # SEC-7: Block git add all (may include secrets)
  - id: SEC-7
    name: Warn on git add all
    description: Warn when using git add -A or git add .
    patterns:
      - 'git\s+add\s+-A'
      - 'git\s+add\s+\.$'
    action: warn
    message: |
      WARNING: 'git add -A' or 'git add .' may include secret files.

      Check what will be added:
        git status

      Or add specific files:
        git add src/ package.json

  # SEC-8: Block git push to prod without review
  - id: SEC-8
    name: Warn on Push to Production
    description: Warn when pushing to production branches
    patterns:
      - 'git\s+push.*main$'
      - 'git\s+push.*master$'
      - 'git\s+push.*prod'
      - 'git\s+push.*production'
    action: warn
    message: |
      WARNING: Pushing to protected branch.

      Ensure:
        - No secrets in commits
        - Code has been reviewed
        - Tests are passing

  # SEC-9: Block force push to protected branches
  - id: SEC-9
    name: No Force Push to Protected
    description: Block force push to main/master/prod
    patterns:
      - 'git\s+push\s+.*--force.*main'
      - 'git\s+push\s+.*--force.*master'
      - 'git\s+push\s+.*--force.*prod'
      - 'git\s+push\s+-f.*main'
      - 'git\s+push\s+-f.*master'
    action: block
    message: |
      BLOCKED: Force push to protected branch is forbidden.

      Force push can:
        - Overwrite team commits
        - Break CI/CD pipelines
        - Cause data loss

redaction:
  enabled: true
  replacement: "[REDACTED]"
  patterns:
    - 'sk-[a-zA-Z0-9]{32,}'
    - 'sk_live_[a-zA-Z0-9]+'
    - 'AKIA[0-9A-Z]{16}'
    - 'ghp_[a-zA-Z0-9]{36}'
    - 'npm_[a-zA-Z0-9]{36}'

integration:
  guardian:
    enabled: true
    priority: 1  # High priority - check before other rules

  sentinel:
    require_confirmation:
      patterns:
        - 'git add.*\.env'
        - 'git push.*(main|master|prod)'
      message: "GIT SAFETY: Potential secret exposure. Type 'CONFIRM' to proceed."

  hooks:
    PreToolUse:
      - matcher: "(Read|Bash).*\\.(env|pem|key|credentials)"
        action: warn
        message: "Accessing sensitive file - ensure no secrets are exposed"

examples:
  blocked:
    - command: "cat .env"
      reason: "Secret file display (SEC-1)"
    - command: "echo $API_KEY"
      reason: "Secret variable echo (SEC-3)"
    - command: "git add .env.prod"
      reason: "Committing secrets (SEC-6)"

  allowed:
    - command: "cat .env.example"
      reason: "Example file is safe"
    - command: "echo $HOME"
      reason: "Non-sensitive variable"
    - command: "test -f .env && echo 'exists'"
      reason: "Checking existence, not content"

related:
  - R-008-git-safety.yaml
  - R-009-harmony-protection.yaml
  - sentinel.md
