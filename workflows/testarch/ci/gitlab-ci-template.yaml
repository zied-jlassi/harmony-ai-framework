# Harmony TestArch — Pipeline de test GitLab CI
# Architecture 4 couches : suite, exécution parallèle, environnements éphémères, observabilité
# Généré par Harmony Framework — /hf:testarch:ci gitlab

stages:
  - lint
  - test-unit
  - test-integration
  - test-e2e
  - quality-gate
  - report

variables:
  COVERAGE_THRESHOLD: "80"
  NODE_VERSION: "20"
  POSTGRES_DB: testdb
  POSTGRES_USER: testuser
  POSTGRES_PASSWORD: testpassword
  REDIS_URL: "redis://redis:6379"
  DATABASE_URL: "postgresql://testuser:testpassword@postgres:5432/testdb"

# ─────────────────────────────────────────────
# Cache partagé pour les dépendances
# ─────────────────────────────────────────────
.node_cache: &node_cache
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
      - node_modules/

.node_setup: &node_setup
  image: node:${NODE_VERSION}-alpine
  before_script:
    - corepack enable
    - pnpm install --frozen-lockfile

# ─────────────────────────────────────────────
# COUCHE 1 : Lint (fail fast)
# ─────────────────────────────────────────────
lint:
  stage: lint
  <<: *node_cache
  <<: *node_setup
  script:
    - pnpm lint
    - pnpm type-check
  only:
    - merge_requests
    - main
    - develop

# ─────────────────────────────────────────────
# COUCHE 1 & 2 : Tests unitaires
# ─────────────────────────────────────────────
unit-tests:
  stage: test-unit
  <<: *node_cache
  <<: *node_setup
  script:
    - pnpm test:coverage --reporter=junit --outputFile=junit-unit.xml
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    when: always
    reports:
      junit: junit-unit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 7 days
  only:
    - merge_requests
    - main
    - develop

# ─────────────────────────────────────────────
# COUCHE 1 & 3 : Tests d'intégration (services Docker éphémères)
# ─────────────────────────────────────────────
integration-tests:
  stage: test-integration
  <<: *node_cache
  <<: *node_setup
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  script:
    - pnpm db:migrate || true
    - pnpm test:integration --reporter=junit --outputFile=junit-integration.xml
  artifacts:
    when: always
    reports:
      junit: junit-integration.xml
    expire_in: 7 days
  only:
    - merge_requests
    - main
    - develop

# ─────────────────────────────────────────────
# COUCHE 1, 2 & 3 : Tests E2E Playwright (parallélisés)
# ─────────────────────────────────────────────
e2e-tests:
  stage: test-e2e
  image: mcr.microsoft.com/playwright:v1.45.0-focal
  parallel: 4
  script:
    - npm install -g pnpm
    - pnpm install --frozen-lockfile
    - |
      pnpm exec playwright test \
        --shard=$CI_NODE_INDEX/$CI_NODE_TOTAL \
        --reporter=junit \
        --output=playwright-report
  artifacts:
    when: always
    reports:
      junit: playwright-results.xml
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days
  only:
    - merge_requests
    - main

# ─────────────────────────────────────────────
# COUCHE 4 : Quality Gate — Seuil de couverture
# ─────────────────────────────────────────────
quality-gate:
  stage: quality-gate
  image: alpine:latest
  needs:
    - unit-tests
    - integration-tests
  before_script:
    - apk add --no-cache python3 bc
  script:
    - |
      if [ -f "coverage/coverage-summary.json" ]; then
        COVERAGE=$(python3 -c "
      import json
      with open('coverage/coverage-summary.json') as f:
          data = json.load(f)
      print(data['total']['lines']['pct'])
      ")
        echo "Coverage: $COVERAGE%"
        echo "Threshold: $COVERAGE_THRESHOLD%"
        if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
          echo "❌ QUALITY GATE FAILED"
          echo "Coverage: $COVERAGE% < Threshold: $COVERAGE_THRESHOLD%"
          exit 1
        fi
        echo "✅ QUALITY GATE PASSED — Coverage: $COVERAGE%"
      else
        echo "⚠️  No coverage report found"
        exit 1
      fi
  artifacts:
    when: always
    paths:
      - coverage/
  only:
    - merge_requests
    - main
    - develop

# ─────────────────────────────────────────────
# COUCHE 4 : Rapport Allure (observabilité)
# ─────────────────────────────────────────────
allure-report:
  stage: report
  image: frankescobar/allure-docker-service
  script:
    - allure generate allure-results --clean -o allure-report
  artifacts:
    paths:
      - allure-report/
    expire_in: 30 days
  when: always
  allow_failure: true
  only:
    - main
