name: test-architect-trace
description: "Génère la matrice de traçabilité bidirectionnelle exigences ↔ tests, détecte les lacunes de couverture et les tests orphelins"
author: "Harmony Framework"
version: "1.0"

config_source: "{project-root}/.harmony/config.yaml"
communication_language: "{config_source}:communication_language"
user_name: "{config_source}:user_name"
document_output_language: "{config_source}:document_output_language"
sprint_artifacts: "{config_source}:sprint_artifacts"

installed_path: "{project-root}/.harmony/workflows/test-architect/trace"
instructions: "{installed_path}/instructions.md"
validation: "{installed_path}/checklist.md"

# scope: full | story-id
scope: "full"
output_matrix: ""  # Auto-généré si vide (ex: docs/test-traceability.md)
coverage_threshold: 80  # % d'exigences couvertes requis

standalone: true
