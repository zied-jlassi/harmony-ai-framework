# NestJS Profile - Centralized Knowledge Model
# ═══════════════════════════════════════════════════════════════
#
# Knowledge centralisé dans knowledge/ (nouveau modèle)
# Override possible via .harmony/local/profiles/backend/nestjs/
#
# ═══════════════════════════════════════════════════════════════

profile:
  id: nestjs
  name: "NestJS"
  category: backend
  level: 2
  description: "NestJS - Progressive Node.js framework"
  last_updated: "2026-01-05"

  requires: [typescript, nodejs]
  optional: [prisma, graphql, typeorm]

# ═══════════════════════════════════════════════════════════════
# VERSIONING - Pour Context7 Queries
# ═══════════════════════════════════════════════════════════════
versioning:
  detection:
    file: "package.json"
    path: "dependencies.@nestjs/core"

  context7:
    library_id: "/nestjs/docs.nestjs.com"
    version_hint: true

  fallback_urls:
    latest: "https://docs.nestjs.com/"
    "10.x": "https://docs.nestjs.com/v10/"

# ═══════════════════════════════════════════════════════════════
# KNOWLEDGE - Références centralisées
# ═══════════════════════════════════════════════════════════════
knowledge:
  # Chemins relatifs à knowledge/ (centralisé)
  base_path: knowledge/

  # Knowledge framework (toujours chargé)
  core:
    - frameworks/nestjs/architecture.md
    - languages/typescript/typescript-advanced-types.md

  # Knowledge partagé
  shared:
    - shared/patterns/api-design-principles.md
    - shared/patterns/error-handling-patterns.md

  # Chargement par intent
  on_intent:
    SECURITY:
      - domains/security/owasp-top10.md
      - domains/security/owasp-checklists.md
    TEST:
      - languages/typescript/typescript-advanced-types.md
    IMPLEMENT:
      - frameworks/nestjs/architecture.md
    DATABASE:
      - shared/patterns/sql-optimization-patterns.md

  # Override local (équipe)
  override:
    enabled: true
    path: .harmony/local/profiles/backend/nestjs/knowledge/

# ═══════════════════════════════════════════════════════════════
# CONTEXT7 INTEGRATION (Docs Officielles On-Demand)
# ═══════════════════════════════════════════════════════════════
context7:
  enabled: true
  library_id: "/nestjs/docs.nestjs.com"

  suggested_queries:
    SECURITY:
      - "authentication JWT passport"
      - "authorization guards RBAC"
    IMPLEMENT:
      - "modules controllers providers"
      - "dependency injection"
    TEST:
      - "testing jest mocking"
      - "e2e supertest"
    DATABASE:
      - "TypeORM Prisma integration"
      - "repositories patterns"

# ═══════════════════════════════════════════════════════════════
# SENTINEL INTEGRATION
# ═══════════════════════════════════════════════════════════════
sentinel:
  watch_tags:
    - nestjs
    - typescript
    - api
    - auth
    - validation
    - prisma

  auto_sync:
    enabled: true
    target: .harmony/local/profiles/backend/nestjs/knowledge/experience/
    on_new_error: true

# ═══════════════════════════════════════════════════════════════
# SOURCES PROFESSIONNELLES (pour /harmony learn)
# ═══════════════════════════════════════════════════════════════
learn_sources:
  recommended:
    - url: "https://www.freecodecamp.org/news/the-nestjs-handbook-learn-to-use-nest-with-code-examples/"
      topics: ["architecture", "patterns"]
    - url: "https://docs.nestjs.com/fundamentals/custom-providers"
      topics: ["di", "providers"]

  search_queries:
    - "NestJS best practices enterprise 2026"
    - "NestJS security authentication patterns"
    - "NestJS microservices architecture"
