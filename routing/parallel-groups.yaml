# Parallel Groups Configuration
# Purpose: Define pipeline phase groups for concurrent agent execution
# Version: 1.0.0

---

# ═══════════════════════════════════════════════════════════════════
# PIPELINE PHASES
# ═══════════════════════════════════════════════════════════════════
#
# Phase 1: Analysis
# Phase 2: Planning/Architecture
# Phase 3: Solutioning
# Phase 4: Implementation

phases:

  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: ANALYSIS
  # ═══════════════════════════════════════════════════════════════
  phase_1_analysis:
    name: Analysis
    description: "Understand the problem, gather requirements"

    primary_agents:
      - analyst
      - product-manager

    parallel_groups:
      # Research can run in parallel
      - group: research
        agents: [analyst]
        can_parallel: true

    outputs:
      - product_brief
      - prd

    exit_criteria:
      - prd_approved

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: PLANNING
  # ═══════════════════════════════════════════════════════════════
  phase_2_planning:
    name: Planning
    description: "Design architecture, plan sprints"

    primary_agents:
      - architect
      - ux-designer
      - ai-architect

    parallel_groups:
      # Architecture and UX can run in parallel
      - group: design
        agents: [architect, ux-designer]
        can_parallel: true
        dependencies:
          - prd_exists

      # AI design runs separately if needed
      - group: ai_design
        agents: [ai-architect]
        can_parallel: true
        dependencies:
          - prd_exists
          - has_ai_requirements

    outputs:
      - architecture_doc
      - adr_files
      - wireframes

    exit_criteria:
      - architecture_approved

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: SOLUTIONING
  # ═══════════════════════════════════════════════════════════════
  phase_3_solutioning:
    name: Solutioning
    description: "Create stories, write UCVs, plan implementation"

    primary_agents:
      - scrum-master
      - ucv-writer

    parallel_groups:
      # Story creation must complete before UCV
      - group: story_creation
        agents: [scrum-master]
        can_parallel: false
        dependencies:
          - architecture_exists

      # UCV creation for each story
      - group: ucv_creation
        agents: [ucv-writer]
        can_parallel: true
        dependencies:
          - story_exists

    # Compliance review can run in parallel
    compliance_review:
      parallel: true
      agents:
        - security
        - rgpd
        - accessibility
      trigger: ucv_created

    outputs:
      - stories
      - ucv_files

    exit_criteria:
      - ucvs_approved

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: IMPLEMENTATION
  # ═══════════════════════════════════════════════════════════════
  phase_4_implementation:
    name: Implementation
    description: "Develop, test, validate"

    primary_agents:
      - developer
      - tester
      - ucv-qa
      - exploratory-qa
      - ucv-validator

    parallel_groups:
      # Dev and Test run sequentially per story
      - group: dev_test
        agents: [developer, tester]
        can_parallel: false
        sequence:
          - developer  # First: implement
          - tester     # Then: write tests
        dependencies:
          - ucv_approved

      # UCV QA after dev+test complete
      - group: ucv_validation
        agents: [ucv-qa]
        can_parallel: true
        dependencies:
          - dev_completed
          - test_completed

      # Exploratory QA (mandatory before closure)
      - group: exploratory
        agents: [exploratory-qa]
        can_parallel: false
        dependencies:
          - ucv_qa_completed

      # Code review can run in parallel with testing
      - group: review
        agents: [review]
        can_parallel: true
        dependencies:
          - dev_completed

      # Final validation
      - group: final_validation
        agents: [ucv-validator]
        can_parallel: false
        dependencies:
          - ucv_qa_completed
          - exploratory_completed

    outputs:
      - code
      - tests
      - qa_report

    exit_criteria:
      - all_ucvs_validated
      - tests_passing
      - exploratory_go

# ═══════════════════════════════════════════════════════════════════
# STORY LIFECYCLE PIPELINE
# ═══════════════════════════════════════════════════════════════════
story_pipeline:
  name: "Story Lifecycle"
  description: "Complete pipeline for a single story"

  stages:
    - stage: creation
      agent: scrum-master
      output: story_file

    - stage: ucv_writing
      agent: ucv-writer
      depends_on: creation
      output: ucv_file

    - stage: approval
      actor: user
      depends_on: ucv_writing
      gate: true

    - stage: implementation
      agent: developer
      depends_on: approval
      marks: "[dev]"

    - stage: testing
      agent: tester
      depends_on: implementation
      marks: "[test]"

    - stage: ucv_qa
      agent: ucv-qa
      depends_on: testing
      marks: "[qa]"

    - stage: exploratory
      agent: exploratory-qa
      depends_on: ucv_qa
      mandatory: true
      output: go_no_go

    - stage: validation
      agent: ucv-validator
      depends_on: exploratory
      gate: true
      requires: "100% coverage"

    - stage: closure
      agent: scrum-master
      depends_on: validation
      output: story_done

# ═══════════════════════════════════════════════════════════════════
# PARALLEL EXECUTION RULES
# ═══════════════════════════════════════════════════════════════════
execution_rules:

  # Maximum concurrent agents
  max_concurrent: 3

  # Agent conflicts (cannot run together)
  conflicts:
    - [developer, architect]  # Don't code while designing
    - [developer, scrum-master]  # Don't code while planning

  # Agent affinities (prefer to run together)
  affinities:
    - [developer, tester]  # Dev and test together
    - [ux-designer, accessibility]  # UX with a11y review

  # Priority order when resources limited
  priority:
    - ucv-validator  # Gates must complete first
    - developer
    - tester
    - ucv-qa
    - exploratory-qa
    - review
