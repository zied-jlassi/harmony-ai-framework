# Detection Patterns Configuration
# Purpose: Define keywords, regex, and context conditions for agent detection
# Version: 1.0.0

---

# Core Agents Detection Patterns
agents:

  # ═══════════════════════════════════════════════════════════════
  # ANALYST - Business Analysis & Requirements
  # ═══════════════════════════════════════════════════════════════
  analyst:
    file: agents/analyst.md
    phase: [1, 2]
    tier: 1
    model: opus

    keywords:
      en:
        - word: analyze
          score: 0.95
        - word: requirement
          score: 0.90
        - word: need
          score: 0.70
        - word: understand
          score: 0.75
        - word: research
          score: 0.80
        - word: brief
          score: 0.85
        - word: prd
          score: 0.95
        - word: stakeholder
          score: 0.80

      fr:
        - word: analyser
          score: 0.95
        - word: analyse
          score: 0.90
        - word: besoin
          score: 0.85
        - word: comprendre
          score: 0.75
        - word: recherche
          score: 0.80
        - word: brief
          score: 0.85
        - word: cahier des charges
          score: 0.95
        - word: exigence
          score: 0.90

    regex:
      - pattern: "(?:analyse|analyze)\\s+(?:the|les|des)?\\s*(?:requirement|besoin|need)"
        score: 0.95
      - pattern: "(?:create|creer)\\s+(?:a|un|une)?\\s*(?:brief|prd)"
        score: 0.90
      - pattern: "(?:understand|comprendre)\\s+(?:the|le|la)?\\s*(?:problem|probleme|need|besoin)"
        score: 0.85

    context:
      phase_match_bonus: 0.20
      prerequisites: []

  # ═══════════════════════════════════════════════════════════════
  # ARCHITECT - System Design & Technical Decisions
  # ═══════════════════════════════════════════════════════════════
