# NestJS Profile - Modèle Hybride 3 Niveaux
# ═══════════════════════════════════════════════════════════════
#
# NIVEAU 1: Industry Standards   → Sources professionnelles (web)
# NIVEAU 2: Project Conventions  → Spécificités équipe (à remplir)
# NIVEAU 3: Experience           → Erreurs passées (auto-Sentinel)
#
# DOCS OFFICIELLES → Context7 on-demand (pas stockées)
#
# ═══════════════════════════════════════════════════════════════

profile:
  id: nestjs
  name: "NestJS"
  category: backend
  level: 2
  model: hybrid-3-levels
  description: "NestJS - Modèle hybride: Industry + Conventions + Experience"
  last_updated: "2026-01-04"

# ═══════════════════════════════════════════════════════════════
# VERSIONING - Pour Context7 Queries
# ═══════════════════════════════════════════════════════════════
versioning:
  detection:
    file: "package.json"
    path: "dependencies.@nestjs/core"

  context7:
    library_id: "/nestjs/docs.nestjs.com"
    version_hint: true

  fallback_urls:
    latest: "https://docs.nestjs.com/"
    "10.x": "https://docs.nestjs.com/v10/"

# ═══════════════════════════════════════════════════════════════
# KNOWLEDGE 3 NIVEAUX
# ═══════════════════════════════════════════════════════════════
knowledge:

  # ─────────────────────────────────────────────────────────────
  # NIVEAU 1: Industry Standards (sources professionnelles)
  # ─────────────────────────────────────────────────────────────
  industry_standards:
    description: "Best practices universelles (FreeCodeCamp, NestJS docs, etc.)"
    load: on_intent
    enriched_via: "/harmony learn --search"
    files:
      - knowledge/industry-standards/architecture.md
      - knowledge/industry-standards/security.md
      - knowledge/industry-standards/testing.md
      - knowledge/industry-standards/performance.md

  # ─────────────────────────────────────────────────────────────
  # NIVEAU 2: Project Conventions (spécifique équipe)
  # ─────────────────────────────────────────────────────────────
  project_conventions:
    description: "Règles spécifiques au projet (à personnaliser)"
    load: always
    user_maintained: true
    files:
      - knowledge/project-conventions/README.md
      - knowledge/project-conventions/api-patterns.md
      - knowledge/project-conventions/naming.md
      - knowledge/project-conventions/security.md

  # ─────────────────────────────────────────────────────────────
  # NIVEAU 3: Experience (auto-enrichi par Sentinel)
  # ─────────────────────────────────────────────────────────────
  experience:
    description: "Erreurs passées et leçons apprises (auto-généré)"
    load: always
    auto_enriched: true
    source: ".claude/memory/error-journal.json"
    filter_tags: ["nestjs", "typescript", "api"]
    files:
      - knowledge/experience/README.md
      - knowledge/experience/pitfalls.md
      - knowledge/experience/solutions.md

# ═══════════════════════════════════════════════════════════════
# CONTEXT7 INTEGRATION (Docs Officielles On-Demand)
# ═══════════════════════════════════════════════════════════════
context7:
  enabled: true
  library_id: "/nestjs/docs.nestjs.com"

  # Queries suggérées par intent
  suggested_queries:
    SECURITY:
      - "authentication JWT passport"
      - "authorization guards RBAC"
    IMPLEMENT:
      - "modules controllers providers"
      - "dependency injection"
    TEST:
      - "testing jest mocking"
      - "e2e supertest"
    DATABASE:
      - "TypeORM Prisma integration"
      - "repositories patterns"

# ═══════════════════════════════════════════════════════════════
# SENTINEL INTEGRATION
# ═══════════════════════════════════════════════════════════════
sentinel:
  watch_tags:
    - nestjs
    - typescript
    - api
    - auth
    - validation
    - prisma

  auto_sync:
    enabled: true
    target: knowledge/experience/
    on_new_error: true

# ═══════════════════════════════════════════════════════════════
# SOURCES PROFESSIONNELLES (pour /harmony learn)
# ═══════════════════════════════════════════════════════════════
learn_sources:
  recommended:
    - url: "https://www.freecodecamp.org/news/the-nestjs-handbook-learn-to-use-nest-with-code-examples/"
      topics: ["architecture", "patterns"]
    - url: "https://docs.nestjs.com/fundamentals/custom-providers"
      topics: ["di", "providers"]

  search_queries:
    - "NestJS best practices enterprise 2025"
    - "NestJS security authentication patterns"
    - "NestJS microservices architecture"
