# =============================================================================
# LLM DEFAULTS - Harmony Framework
# =============================================================================
# Simple architecture:
#   1. MODELS: Available models with aliases
#   2. MODEL_KEYS: Constants used in agents (model_1, model_2, model_3)
#   3. Agents reference model_keys, not specific models
#
# =============================================================================

version: "3.0"

