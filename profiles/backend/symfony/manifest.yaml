# Symfony Profile - Modèle Hybride 3 Niveaux
# ═══════════════════════════════════════════════════════════════
#
# NIVEAU 1: Industry Standards   → Sources professionnelles (web)
# NIVEAU 2: Project Conventions  → Spécificités équipe (à remplir)
# NIVEAU 3: Experience           → Erreurs passées (auto-Sentinel)
#
# DOCS OFFICIELLES → Context7 on-demand (pas stockées)
#
# ═══════════════════════════════════════════════════════════════

profile:
  id: symfony
  name: "Symfony"
  category: backend
  level: 2
  model: hybrid-3-levels
  description: "Symfony - Modèle hybride: Industry + Conventions + Experience"
  last_updated: "2026-01-04"

# ═══════════════════════════════════════════════════════════════
# VERSIONING - Pour Context7 Queries
# ═══════════════════════════════════════════════════════════════
versioning:
  latest: "7.4"
  lts: "6.4"

  versions:
    "7.4":
      released: "2024-11"
      php_min: "8.2"
      features: ["attributes routing", "autowire", "mapRequestPayload"]
    "6.4":
      released: "2023-11"
      php_min: "8.1"
      features: ["LTS", "attributes", "autowiring"]
      lts_until: "2027-11"
    "5.4":
      deprecated: true
      php_min: "7.2.5"
      features: ["annotations", "autowiring"]

  detection:
    file: "composer.json"
    path: "require.symfony/framework-bundle"
    fallback: "latest"

  context7:
    default: "/websites/symfony_doc"
    "7.4": "/websites/symfony_doc_7_4"
    "6.4": "/websites/symfony_doc_6_4"
    "5.x": "/websites/symfony_doc_5_x"
    version_hint: true

  fallback_urls:
    latest: "https://symfony.com/doc/current/"
    "6.4": "https://symfony.com/doc/6.4/"
    "5.4": "https://symfony.com/doc/5.4/"

dependencies:
  required:
    - php
  optional:
    - doctrine
    - twig

# ═══════════════════════════════════════════════════════════════
# KNOWLEDGE 3 NIVEAUX
# ═══════════════════════════════════════════════════════════════
knowledge:

  # ─────────────────────────────────────────────────────────────
  # NIVEAU 1: Industry Standards (sources professionnelles)
  # ─────────────────────────────────────────────────────────────
  industry_standards:
    description: "Best practices Symfony officielles"
    load: on_intent
    enriched_via: "/harmony learn --search"
    files:
      - knowledge/industry-standards/architecture.md
      - knowledge/industry-standards/controllers.md
      - knowledge/industry-standards/services.md
      - knowledge/industry-standards/security.md

  # ─────────────────────────────────────────────────────────────
  # NIVEAU 2: Project Conventions (spécifique équipe)
  # ─────────────────────────────────────────────────────────────
  project_conventions:
    description: "Règles spécifiques au projet (à personnaliser)"
    load: always
    user_maintained: true
    files:
      - knowledge/project-conventions/README.md

  # ─────────────────────────────────────────────────────────────
  # NIVEAU 3: Experience (auto-enrichi par Sentinel)
  # ─────────────────────────────────────────────────────────────
  experience:
    description: "Erreurs passées et leçons apprises (auto-généré)"
    load: always
    auto_enriched: true
    source: ".claude/memory/error-journal.json"
    filter_tags: ["symfony", "php", "doctrine", "api"]
    files:
      - knowledge/experience/README.md

# ═══════════════════════════════════════════════════════════════
# CONTEXT7 INTEGRATION (Docs Officielles On-Demand)
# ═══════════════════════════════════════════════════════════════
context7:
  enabled: true
  library_id: "/websites/symfony_doc"

  suggested_queries:
    SECURITY:
      - "authentication security voters"
      - "authorization access control"
    IMPLEMENT:
      - "controllers routing attributes"
      - "dependency injection autowire"
    DATABASE:
      - "doctrine ORM entities"
      - "migrations repositories"
    FORMS:
      - "forms validation constraints"
    TEST:
      - "testing phpunit functional"

# ═══════════════════════════════════════════════════════════════
# SENTINEL INTEGRATION
# ═══════════════════════════════════════════════════════════════
sentinel:
  watch_tags:
    - symfony
    - php
    - doctrine
    - twig
    - api
    - security

  auto_sync:
    enabled: true
    target: knowledge/experience/
    on_new_error: true

# ═══════════════════════════════════════════════════════════════
# SOURCES PROFESSIONNELLES (pour /harmony learn)
# ═══════════════════════════════════════════════════════════════
learn_sources:
  recommended:
    - url: "https://symfony.com/doc/current/best_practices.html"
      topics: ["architecture", "conventions"]
    - url: "https://symfony.com/doc/current/controller.html"
      topics: ["controllers", "routing"]

  search_queries:
    - "Symfony best practices enterprise 2025"
    - "Symfony security authentication patterns"
    - "Symfony API Platform integration"
